name: Package desktop releases

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: powerpong-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Compile, test, and smoke-test packaged JAR
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build and verify
        id: verification
        shell: bash
        run: |
          set +e

          mvn --batch-mode --no-transfer-progress clean package 2>&1 | tee build.log
          build_status=${PIPESTATUS[0]}

          smoke_status=99
          if [[ "$build_status" -eq 0 ]]; then
            java -Djava.awt.headless=true -cp target/powerpong.jar com.mrcalzon.powerpong.RenderSmokeCheck 2>&1 | tee smoke-test.log
            smoke_status=${PIPESTATUS[0]}
          else
            echo "Smoke test skipped because Maven compilation, tests, or packaging failed." | tee smoke-test.log
          fi

          if [[ "$build_status" -eq 0 && "$smoke_status" -eq 0 ]]; then
            overall=success
            exit_status=0
          else
            overall=failure
            exit_status=1
          fi

          echo "build_status=$build_status" >> "$GITHUB_OUTPUT"
          echo "smoke_status=$smoke_status" >> "$GITHUB_OUTPUT"
          echo "overall=$overall" >> "$GITHUB_OUTPUT"
          exit "$exit_status"

      - name: Write verification report
        if: always()
        shell: bash
        env:
          BUILD_STATUS: ${{ steps.verification.outputs.build_status }}
          SMOKE_STATUS: ${{ steps.verification.outputs.smoke_status }}
          OVERALL_STATUS: ${{ steps.verification.outputs.overall }}
        run: |
          build_status="${BUILD_STATUS:-unavailable}"
          smoke_status="${SMOKE_STATUS:-unavailable}"
          overall_status="${OVERALL_STATUS:-failure}"

          if [[ "$overall_status" == "success" ]]; then
            marker="✅"
          else
            marker="❌"
          fi

          cat > verification-report.md <<EOF
          ## ${marker} PowerPong release verification

          - **Commit:** \`${GITHUB_SHA}\`
          - **Branch/ref:** \`${GITHUB_REF}\`
          - **Event:** \`${GITHUB_EVENT_NAME}\`
          - **Maven compile, tests, and JAR package exit code:** \`${build_status}\`
          - **Packaged-JAR smoke-test exit code:** \`${smoke_status}\`
          - **Overall:** **${overall_status}**
          - **Workflow run:** ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          The attached workflow artifact contains \`build.log\`, \`smoke-test.log\`, and any Maven Surefire reports produced by this run.
          EOF

      - name: Publish verification report to issue 4
        if: always() && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh issue comment 4 --repo "$GITHUB_REPOSITORY" --body-file verification-report.md

      - name: Upload verification evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: PowerPong-verification-${{ github.run_id }}
          path: |
            build.log
            smoke-test.log
            verification-report.md
            target/surefire-reports/**
          if-no-files-found: warn
          retention-days: 30

  package:
    name: Package ${{ matrix.label }}
    needs: verify
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows-x64
          - os: ubuntu-latest
            label: Linux-x64
          - os: macos-15-intel
            label: macOS-x64
          - os: macos-15
            label: macOS-arm64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build executable JAR
        run: mvn --batch-mode --no-transfer-progress -DskipTests clean package

      - name: Verify packaged renderer on target platform
        shell: bash
        run: java -Djava.awt.headless=true -cp target/powerpong.jar com.mrcalzon.powerpong.RenderSmokeCheck

      - name: Build self-contained application image
        shell: bash
        run: |
          mkdir -p build/app-image build/release
          platform_args=()
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            platform_args+=(--mac-package-identifier com.mrcalzon.powerpong)
            platform_args+=(--mac-package-name PowerPong)
          fi
          jpackage \
            --type app-image \
            --input target \
            --main-jar powerpong.jar \
            --main-class com.mrcalzon.powerpong.PowerPongApp \
            --name PowerPong \
            --app-version 1.0.0 \
            --vendor "PowerPong Project" \
            --description "Neon science-fiction power-up Pong" \
            --dest build/app-image \
            --verbose \
            "${platform_args[@]}"

      - name: Assemble Windows package
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bundle = "build/release/PowerPong-Windows-x64"
          New-Item -ItemType Directory -Force -Path $bundle | Out-Null
          Copy-Item -Path "build/app-image/PowerPong/*" -Destination $bundle -Recurse -Force
          Copy-Item "target/powerpong.jar" "$bundle/PowerPong-Requires-Java17.jar"
          @"
          @echo off
          cd /d "%~dp0"
          start "" "%~dp0PowerPong.exe"
          "@ | Set-Content -Encoding ASCII "$bundle/START-POWERPONG.bat"
          @"
          POWERPONG - WINDOWS X64

          START HERE:
            Double-click PowerPong.exe or START-POWERPONG.bat in this folder.

          This package includes its own compatible Java runtime.
          You do not need to install Java separately.

          IMPORTANT:
            Java 8, including jre-8u491-windows-x64, cannot launch this game JAR.
            The fallback JAR requires Java 17 or newer and is deliberately named:
            PowerPong-Requires-Java17.jar

          Controls:
            P-1: W / S
            P-2: Up Arrow / Down Arrow
            Pause: Space or P
            Menu: Escape
          "@ | Set-Content -Encoding UTF8 "$bundle/README-FIRST.txt"
          Compress-Archive -Path "$bundle/*" -DestinationPath "build/release/PowerPong-Windows-x64.zip" -Force

      - name: Assemble Linux package
        if: runner.os == 'Linux'
        shell: bash
        run: |
          bundle="build/release/PowerPong-Linux-x64"
          mkdir -p "$bundle"
          mv build/app-image/PowerPong "$bundle/PowerPong"
          cp target/powerpong.jar "$bundle/PowerPong-Requires-Java17.jar"
          cat > "$bundle/README.txt" <<'EOF'
          POWERPONG - LINUX X64

          Recommended launch:
            Run PowerPong/bin/PowerPong

          No separate Java installation is required for that launcher.

          Alternate launch for users with Java 17 or newer:
            java -jar PowerPong-Requires-Java17.jar

          Controls:
            P-1: W / S
            P-2: Up Arrow / Down Arrow
            Pause: Space or P
            Menu: Escape
          EOF
          tar -C build/release -czf build/release/PowerPong-Linux-x64.tar.gz PowerPong-Linux-x64

      - name: Assemble macOS package
        if: runner.os == 'macOS'
        shell: bash
        run: |
          bundle="build/release/PowerPong-${{ matrix.label }}"
          mkdir -p "$bundle"
          mv build/app-image/PowerPong.app "$bundle/PowerPong.app"
          cp target/powerpong.jar "$bundle/PowerPong-Requires-Java17.jar"
          cat > "$bundle/README.txt" <<'EOF'
          POWERPONG - MACOS

          Recommended launch:
            Open PowerPong.app.

          No separate Java installation is required for the application bundle.
          Because this early build is unsigned, macOS may require Control-clicking
          PowerPong.app and choosing Open the first time.

          Alternate launch for users with Java 17 or newer:
            java -jar PowerPong-Requires-Java17.jar

          Controls:
            P-1: W / S
            P-2: Up Arrow / Down Arrow
            Pause: Space or P
            Menu: Escape
          EOF
          ditto -c -k --sequesterRsrc --keepParent "$bundle" "build/release/PowerPong-${{ matrix.label }}.zip"

      - name: Upload release package
        uses: actions/upload-artifact@v7
        with:
          name: PowerPong-${{ matrix.label }}
          path: |
            build/release/*.zip
            build/release/*.tar.gz
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish rolling GitHub release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: package
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged applications
        uses: actions/download-artifact@v5
        with:
          path: release-assets
          merge-multiple: true

      - name: Write release notes
        shell: bash
        run: |
          cat > release-notes.md <<'EOF'
          # PowerPong desktop builds

          These are prebuilt, self-contained PowerPong packages.

          Choose the archive matching your computer:

          - `PowerPong-Windows-x64.zip` — extract it and run the top-level `PowerPong.exe` or `START-POWERPONG.bat`.
          - `PowerPong-Linux-x64.tar.gz` — run `PowerPong/bin/PowerPong`.
          - `PowerPong-macOS-x64.zip` — Intel Macs.
          - `PowerPong-macOS-arm64.zip` — Apple Silicon Macs.

          The native launcher packages include their own Java runtime. A separate Java installation is not required.

          The included fallback JAR is named `PowerPong-Requires-Java17.jar`. Java 8 cannot launch it; it requires Java 17 or newer.

          This rolling release is rebuilt whenever verified changes reach `main`.
          EOF

      - name: Publish direct-download release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release delete powerpong-desktop-latest --repo "$GITHUB_REPOSITORY" --cleanup-tag --yes || true
          gh release create powerpong-desktop-latest \
            release-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "PowerPong Desktop Builds" \
            --notes-file release-notes.md \
            --latest
