name: Build standalone JARs

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.label }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
          - os: ubuntu-latest
            label: linux-x64
          - os: macos-15-intel
            label: macos-x64
          - os: macos-15
            label: macos-arm64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build shaded executable JAR
        run: mvn --batch-mode --no-transfer-progress clean package

      - name: Render gameplay smoke frame
        run: java -Djava.awt.headless=true -cp target/powerpong.jar com.mrcalzon.powerpong.RenderSmokeCheck

      - name: Name platform artifact
        shell: bash
        run: cp target/powerpong.jar "target/powerpong-${{ matrix.label }}.jar"

      - name: Upload standalone JAR
        uses: actions/upload-artifact@v7
        with:
          name: powerpong-${{ matrix.label }}
          path: target/powerpong-${{ matrix.label }}.jar
          if-no-files-found: error
